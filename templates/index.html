<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pharmacy Dashboard</title>
</head>
<body>
    <div class="container">
        <h1>Pharmacy Dashboard</h1>

        <div class="section">
            <h2>Box Status</h2>
            <div id="boxes-container">
                Loading boxes...
            </div>
        </div>

        <div class="section">
            <h2>Dispatch New Order</h2>
            <input type="text" id="student-input" placeholder="Enter student number"/>
            <button onclick="dispatch()">Dispatch</button>
            <p id="dispatch-message"></p>
        </div>
    </div>
    <script>
    async function loadBoxes() {
        const response = await fetch('/boxes')
        const data = await response.json()
        
        const container = document.getElementById('boxes-container')
        container.innerHTML = ''
        
        data.boxes.forEach(box => {
            const div = document.createElement('div')
            div.innerHTML = `
                Box ${box.box_number} — 
                ${box.status.toUpperCase()} 
                ${box.student_id ? '— ' + box.student_id : ''}
            `
            container.appendChild(div)
        })
    }

    loadBoxes()
    setInterval(loadBoxes,5000)

    async function dispatch() {
    const studentInput = document.getElementById('student-input')
    const message = document.getElementById('dispatch-message')
    const student_id = studentInput.value

    if (student_id === '') {
        message.innerText = 'Please enter a student number!'
        return
    }

    const response = await fetch('/dispatch', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ student_id: student_id })
    })

    const data = await response.json()

    if (data.error) {
        message.innerText = 'Error: ' + data.error
    } else {
        message.innerText = 'Dispatched! ' + student_id + ' assigned to box ' + data.box_number
        studentInput.value = ''
        loadBoxes()
    }
}
    </script>

</body>

</html>
