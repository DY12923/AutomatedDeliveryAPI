<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Base document metadata for encoding and responsive layout. -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automated Pharmacy Dashboard</title>
    <!-- Use Flask's url_for for proper static linking -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <!-- Main dashboard shell. -->
    <div class="container">
        <header>
            <h1>Automated Pharmacy Dashboard</h1>
        </header>

        <main>
            <!-- Manual dispatch section for creating new deliveries. -->
            <section class="section">
                <h2>Dispatch New Delivery</h2>
                <div class="dispatch-form">
                    <div class="input-group">
                        <input type="text" id="student-input" placeholder="Enter student number (e.g., S12345)" />
                    </div>
                    <button id="dispatch-btn">Dispatch Order</button>
                </div>
                <div id="dispatch-message"></div>
            </section>

            <!-- Real-time locker status cards rendered by dashboard.js. -->
            <section class="section">
                <h2>Box Status</h2>
                <div id="boxes-container">
                    <div class="loading">Loading pharmacy box statuses...</div>
                </div>
            </section>
        </main>
    </div>

    <!-- Modular JS loading -->
    <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
</body>
</html>
